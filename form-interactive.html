<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <form action="" class="form" autocomplete="off">
        <h1>REGISTER</h1>
        <div class="form-group">
            <label for="display-name" class="form-label">Display Name:</label>
            <input class="form-var" type="text" id="display-name" placeholder="Display Name...." spellcheck="false">
        </div>

         <div class="form-group">
            <label for="email" class="form-label">Email:</label>
            <input class="form-var" type="email" id="email" placeholder="Email...." spellcheck="false">
        </div>

        <div class="form-group">
            <label for="phonenumber" class="form-label">Phone Number:</label>
            <input class="form-var" type="tel" id="phonenumber" placeholder="Phone Number.... " spellcheck="false">
        </div>

        <div class="form-group">
            <label for="password" class="form-label">Password:</label>
            <input class="form-var" type="password" id="password" placeholder="Password...." spellcheck="false">
        </div>

        <div class="form-group">
            <label for="confirm-password" class="form-label">Confirm Password:</label>
            <input class="form-var" type="password" id="confirm-password" placeholder="Confirm Password...." spellcheck="false">
        </div>

        <div class="form-group">
            <label class="form-label">Gender:</label>
            <label>
                <input type="radio" name="gender" />
                Male
            </label>
            <label>
                <input type="radio" name="gender" />
                 Female
            </label>
            <label>
                <input type="radio" name="gender" />
                Other
            </label>
        </div>

        <div class="form-group">
            <label for="date-of-birth" class="form-label">Date of Birth :</label>
            <input type="date" id="date-of-birth" class="form-var">
        </div>

        <div class="form-group">
            <label for="address" class="form-label">Address:</label>
            <input class="form-var" type="text" id="address" placeholder="Address....">
        </div>

        <div class="form-group">
            <label for="profile-picture" class="form-label">Avatar:</label>
            <label for="profile-picture" class="form-avatar">
                <img width="100px" src="./img/avatar.png" alt="" class="avatar-img">
            </label>
            
            <input type="file"  id="profile-picture" accept="image/*" hidden>
        </div>

        <div class="form-group">
            <label class="form-label">Communication Preferences:</label>
            <div class="colum">
            <label>
                <input type="checkbox" name="preferences" />
                Subscribe to Newsletter
            </label>
            <label>
                <input type="checkbox" name="preferences" />
                Receive Promotional Emails
            </label>
            <label>
                <input type="checkbox" name="preferences" />
                Get Product Updates
            </label>
            </div>
        </div>
        
        <button class="btn">Register</button>
    </form>
</body>
</html>
